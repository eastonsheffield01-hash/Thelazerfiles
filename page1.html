    margin:0;
    font-family: "Courier New", monospace;
    background:black;

header{
    text-align:center;
    padding:30px;
}

header h1{
    color:#ff00ff;
    text-shadow:0 0 15px #ff00ff;
}

/* Navigation */

nav{
    text-align:center;
    padding:10px;
    border-top:1px solid #00ffff;
    border-bottom:1px solid #00ffff;
}

nav a{
    color:#00ffff;
    text-decoration:none;
    margin:0 20px;
    font-size:18px;
}

nav a:hover{
    color:#ff00ff;
}

/* Video Grid */

.video-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:40px;
    padding:40px;
}

.video-box{
    width:420px;
    border:2px solid #00ffff;
    padding:10px;
    box-shadow:0 0 20px #00ffff;
}

.video-box video{
    width:100%;
}

.video-title{
    text-align:center;
    margin-top:10px;
    color:#ff00ff;
}

</style>
</head>
